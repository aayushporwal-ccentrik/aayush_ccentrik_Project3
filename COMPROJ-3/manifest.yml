# SAP Cloud Foundry Manifest Configuration
# Deployment file for PUNIT Management System
# Updated: March 8, 2026

applications:
- name: Report_App
  path: target/COMPROJ-0.0.1-SNAPSHOT.war
  
  # Memory and Disk Configuration
  memory: 1024M
  disk_quota: 1024M
  instances: 1
  
  # Route Configuration
  random-route: false
  routes:
    - route: report-app2.cfapps.ap21.hana.ondemand.com
  
  # Buildpack for Jakarta (Java 17)
  buildpacks:
      - sap_java_buildpack_jakarta
  
  # Environment Variables
  env:
    # Java Options
    JAVA_OPTS: "-Dspring.profiles.active=cloud"
    
    # Spring Boot Configuration
    JBP_CONFIG_SPRING_AUTO_RECONFIGURATION: "{enabled: true}"
    SPRING_PROFILES_ACTIVE: "cloud"
    SPRING_CLOUD_SERVICES_ENABLED: "false"
    
    # Optional: Database service binding (if using SAP HANA service)
    # Uncomment if using bound database service
    # DATABASE_NAME: "my-database"
    # DATABASE_SCHEMA: "PUNIT"
    
    # Logging
    LOGGING_LEVEL_ROOT: "INFO"
    LOGGING_LEVEL_COM_PUNIT: "DEBUG"
  
  # Services to bind (optional)
  # Uncomment if you have database service in your Cloud Foundry space
  # services:
  #   - my-postgresql-instance
  #   - my-hana-instance

  # Health Check Configuration
  health-check-type: http
  health-check-http-endpoint: /
  timeout: 180  # 3 minutes startup timeout