---
applications:
  - name: reportApp
    path: target/COMPROJ-0.0.1-SNAPSHOT.war
    
    # Memory and Disk Configuration
    memory: 1024M
    disk_quota: 1024M
    instances: 1
    
    # Route Configuration
    random-route: true
    
    # ✅ CORRECT: Use java_buildpack (NOT sap_java_buildpack_jakarta)
    # sap_java_buildpack_jakarta is for SAP-specific apps and may not be available
    buildpacks:
      - java_buildpack
    
    # ✅ Environment Variables for Java 17
    env:
      # ✅ CRITICAL: Force Java 17 runtime
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.0.+ } }'
      
      # Java Options for Spring Boot
      JAVA_OPTS: "-Dspring.profiles.active=cloud -Xmx768m -Xms512m"
      
      # Spring Boot Configuration
      JBP_CONFIG_SPRING_AUTO_RECONFIGURATION: "{enabled: true}"
      SPRING_PROFILES_ACTIVE: "cloud"
      SPRING_CLOUD_SERVICES_ENABLED: "false"
      
      # Server Configuration
      SERVER_PORT: "8080"
      SERVER_SERVLET_CONTEXT_PATH: "/"
      
      # Logging
      LOGGING_LEVEL_ROOT: "INFO"
      LOGGING_LEVEL_COM_PUNIT: "DEBUG"
    
    # ✅ Service Binding - Change 'sql' to match your actual service name
    # First, verify your service name with: cf services
    services:
      - sql
    
    # Health Check Configuration
    health-check-type: http
    health-check-http-endpoint: /
    timeout: 180
